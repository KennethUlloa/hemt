{% extends "base.html" %}
{% block title %}Compose - HEMT{% endblock %}
{% block content %}
<div class="compose-page">
  <h1>Compose Email</h1>

  <form method="post" enctype="multipart/form-data" class="compose-form">
    <div class="form-group">
      <label for="from_addr">From</label>
      <input type="email" id="from_addr" name="from_addr"
             value="{{ from_addr }}" placeholder="sender@example.com" required autofocus>
    </div>

    <div class="form-group">
      <label for="to_addr">To <span class="hint">(your email address)</span></label>
      <input type="email" id="to_addr" name="to_addr" value="{{ to_addr }}"
             placeholder="inbox@yourdomain.com" required>
    </div>

    <div class="form-group">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" value="{{ subject }}" placeholder="Subject">
    </div>

    <div class="form-group">
      <label for="body_text">Body</label>
      <textarea id="body_text" name="body_text" rows="10" placeholder="Write your email body here...">{{ body_text }}</textarea>
    </div>

    <div class="form-group">
      <label for="attachments">Attachments</label>
      <input type="file" id="attachments" name="attachment" multiple>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('web.inbox') }}" class="btn">Cancel</a>
      <button type="submit" class="btn btn-primary">Send Email</button>
    </div>
  </form>
</div>
{% endblock %}
